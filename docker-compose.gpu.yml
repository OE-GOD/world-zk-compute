# Docker Compose for GPU-accelerated prover deployment
#
# Includes:
#   - prover:           risc0 ZK prover with CUDA acceleration
#   - warm-prover-gpu:  XGBoost Remainder prover (GKR/Hyrax) with GPU hints
#
# Usage:
#   docker compose -f docker-compose.gpu.yml up -d
#
# Prerequisites:
#   - NVIDIA GPU(s) with CUDA 12.x drivers
#   - NVIDIA Container Toolkit installed
#   - .env file with PRIVATE_KEY, RPC_URL, ENGINE_ADDRESS

services:
  # -- risc0 ZK Prover (CUDA) ---------------------------------------------------
  prover:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - PRIVATE_KEY=${PRIVATE_KEY}
      - RPC_URL=${RPC_URL}
      - WS_URL=${WS_URL:-}
      - ENGINE_ADDRESS=${ENGINE_ADDRESS}
      - REGISTRY_ADDRESS=${REGISTRY_ADDRESS:-}
      - PROVING_MODE=${PROVING_MODE:-gpu-fallback}
      - MAX_CONCURRENT=${MAX_CONCURRENT:-4}
      - MAX_GPU_CONCURRENT=${MAX_GPU_CONCURRENT:-0}
      - MAX_CPU_CONCURRENT=${MAX_CPU_CONCURRENT:-0}
      - USE_SNARK=${USE_SNARK:-false}
      - CACHE_SIZE_MB=${CACHE_SIZE_MB:-256}
      - HEALTH_PORT=8081
      - RUST_LOG=${RUST_LOG:-info}
    ports:
      - "${HEALTH_PORT:-8081}:8081"
    volumes:
      - prover-cache:/app/cache
      - prover-data:/app/data
      - ./programs:/app/programs:ro
    restart: unless-stopped
    mem_limit: 4g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    # Security hardening
    # Note: no read_only -- prover writes to cache and data volumes
    # Note: no user -- GPU device access may require root in some configurations
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    pids_limit: 200
    networks:
      - backend

  # -- XGBoost Remainder Warm Prover (GPU-accelerated) ---------------------------
  #
  # Serves GKR/Hyrax proofs for XGBoost decision tree inference.
  # GPU environment is set for future ICICLE integration (v3.8+) which can
  # accelerate Groth16 wrapping and multi-scalar multiplication by ~3x.
  #
  # The prover URL should be pointed at this service:
  #   PROVER_URL=http://warm-prover-gpu:3000
  warm-prover-gpu:
    build:
      context: ./examples/xgboost-remainder
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      - REMAINDER_GPU=1
      - RUST_LOG=${RUST_LOG:-info}
    ports:
      - "${WARM_PROVER_PORT:-3000}:3000"
    restart: unless-stopped
    mem_limit: 4g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 5
    # Security hardening
    # Note: no user -- GPU device access may require root in some configurations
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=256m
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    pids_limit: 200
    networks:
      - backend

networks:
  backend:

volumes:
  prover-cache:
  prover-data:
