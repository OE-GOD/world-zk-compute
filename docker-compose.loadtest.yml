# ===============================================================================
# TEE + ZK Dispute System -- Load Testing
#
# Full local stack (anvil, deployer, enclave, warm-prover, operator, indexer)
# plus a load-tester service that runs all 3 load test scripts sequentially.
#
# Usage:
#   docker compose -f docker-compose.loadtest.yml build
#   docker compose -f docker-compose.loadtest.yml up
#   docker compose -f docker-compose.loadtest.yml down -v
#
# Results are written to ./load-test-results/ on the host.
# ===============================================================================

services:
  # -- Local Ethereum Node -------------------------------------------------------
  anvil:
    image: ghcr.io/foundry-rs/foundry:v1.0.0
    entrypoint:
      - anvil
      - --host
      - "0.0.0.0"
      - --gas-limit
      - "500000000"
      - --code-size-limit
      - "200000"
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 2s
      timeout: 5s
      retries: 10
    # Security hardening
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    user: "1000:1000"
    pids_limit: 100
    networks:
      - backend

  # -- Contract Deployer (runs once, exits) ---------------------------------------
  deployer:
    image: ghcr.io/foundry-rs/foundry:v1.0.0
    volumes:
      - ./contracts:/contracts
      - deployment-data:/deployment
    working_dir: /contracts
    depends_on:
      anvil:
        condition: service_healthy
    environment:
      DEPLOYER_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      RPC_URL: "http://anvil:8545"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "=== Deploying contracts ==="

        forge script script/DeployAll.s.sol:DeployAll \
          --rpc-url $$RPC_URL \
          --private-key $$DEPLOYER_KEY \
          --broadcast \
          --code-size-limit 200000

        echo "=== Extracting addresses ==="
        BROADCAST_FILE=$$(find broadcast/DeployAll.s.sol -name "run-latest.json" | head -1)

        if [ -z "$$BROADCAST_FILE" ]; then
          echo "ERROR: No broadcast file found"
          exit 1
        fi

        REMAINDER=$$(jq -r '.transactions[] | select(.contractName == "RemainderVerifier") | .contractAddress // empty' "$$BROADCAST_FILE" | head -1)
        TEE=$$(jq -r '.transactions[] | select(.contractName == "TEEMLVerifier") | .contractAddress // empty' "$$BROADCAST_FILE" | head -1)
        DEPLOYER=$$(jq -r '.transactions[0].transaction.from // empty' "$$BROADCAST_FILE")

        cat > /deployment/addresses.json <<ADDR_EOF
        {
          "RemainderVerifier": "$$REMAINDER",
          "TEEMLVerifier": "$$TEE",
          "deployer": "$$DEPLOYER"
        }
        ADDR_EOF

        echo "=== Deployment complete ==="
        echo "  RemainderVerifier: $$REMAINDER"
        echo "  TEEMLVerifier:     $$TEE"
        cat /deployment/addresses.json
    restart: "no"
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    user: "1000:1000"
    pids_limit: 100
    networks:
      - backend

  # -- TEE Enclave ----------------------------------------------------------------
  enclave:
    build:
      context: ./tee
    ports:
      - "8080:8080"
    environment:
      MODEL_PATH: /app/model/model.json
      PORT: "8080"
      ENCLAVE_PRIVATE_KEY: "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Security hardening
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    user: "1000:1000"
    pids_limit: 100
    networks:
      - frontend
      - backend

  # -- Warm Prover (ZK Proof Server) ---------------------------------------------
  warm-prover:
    build:
      context: ./examples/xgboost-remainder
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    mem_limit: 2g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Security hardening
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=256m
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    user: "1000:1000"
    pids_limit: 100
    networks:
      - backend

  # -- Operator Service -----------------------------------------------------------
  operator:
    build:
      context: .
      dockerfile: services/operator/Dockerfile
    depends_on:
      deployer:
        condition: service_completed_successfully
      enclave:
        condition: service_healthy
      warm-prover:
        condition: service_healthy
    ports:
      - "9090:9090"
    environment:
      OPERATOR_RPC_URL: "http://anvil:8545"
      OPERATOR_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      ENCLAVE_URL: "http://enclave:8080"
      PROVER_URL: "http://warm-prover:3000"
      MODEL_PATH: /app/model/model.json
      PROOFS_DIR: /app/proofs
      PRECOMPUTE_BIN: /usr/local/bin/precompute_proof
      RUST_LOG: "info"
      RUST_LOG_FORMAT: "json"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9090/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - deployment-data:/deployment:ro
      - proof-storage:/app/proofs
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    user: "1000:1000"
    pids_limit: 100
    networks:
      - backend

  # -- Indexer (event indexer + REST API) -----------------------------------------
  indexer:
    build:
      context: .
      dockerfile: services/indexer/Dockerfile
    depends_on:
      operator:
        condition: service_healthy
    ports:
      - "8081:8081"
    volumes:
      - deployment-data:/deployment:ro
    environment:
      INDEXER_RPC_URL: "http://anvil:8545"
      DEPLOYMENT_FILE: "/deployment/addresses.json"
      DB_PATH: "/data/indexer.db"
      POLL_INTERVAL_SECS: "2"
      RUST_LOG: "info"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    mem_limit: 256m
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    pids_limit: 100
    networks:
      - backend

  # -- Load Tester (runs all 3 load test scripts) --------------------------------
  load-tester:
    image: python:3.11-slim
    depends_on:
      enclave:
        condition: service_healthy
      warm-prover:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
      - ./load-test-results:/results
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -uo pipefail
        apt-get update -qq && apt-get install -y -qq curl bc > /dev/null 2>&1

        TIMESTAMP=$$(date +%Y%m%d_%H%M%S)
        RESULT_DIR="/results/$$TIMESTAMP"
        mkdir -p "$$RESULT_DIR"

        echo "============================================"
        echo "  World ZK Compute -- Load Test Suite"
        echo "  Timestamp: $$TIMESTAMP"
        echo "============================================"
        echo ""

        # --- Test 1: Enclave /infer ---
        echo ">>> [1/3] Load testing enclave..."
        bash /scripts/load-test-enclave.sh \
          --url http://enclave:8080 \
          --concurrency 5 \
          --requests 50 \
          2>&1 | tee "$$RESULT_DIR/enclave.txt"
        echo ""

        # --- Test 2: Prover /prove/batch ---
        echo ">>> [2/3] Load testing prover batch..."
        bash /scripts/load-test-prover-batch.sh \
          --url http://warm-prover:3000 \
          --concurrency 3 \
          --requests 15 \
          --batch-size 4 \
          2>&1 | tee "$$RESULT_DIR/prover-batch.txt"
        echo ""

        # --- Test 3: Prover /prove (single) ---
        echo ">>> [3/3] Load testing prover single..."
        bash /scripts/load-test-prover.sh \
          --url http://warm-prover:3000 \
          --concurrency 5 \
          --requests 30 \
          2>&1 | tee "$$RESULT_DIR/prover-single.txt"
        echo ""

        echo "============================================"
        echo "  Load test complete!"
        echo "  Results: $$RESULT_DIR/"
        echo "============================================"
        ls -la "$$RESULT_DIR/"
    restart: "no"
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    pids_limit: 200
    networks:
      - frontend
      - backend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  deployment-data:
  proof-storage:
