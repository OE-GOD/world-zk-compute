# -- Global configuration shared across all components
global:
  # -- Ethereum JSON-RPC endpoint (REQUIRED — set via --set or values override)
  rpcUrl: ""
  # -- TEEMLVerifier contract address (REQUIRED — set via --set or values override)
  contractAddress: ""
  # -- Target chain ID (11155111=Sepolia, 1=Mainnet, 31337=Anvil)
  chainId: ""
  # -- Rust log filter (trace, debug, info, warn, error)
  logLevel: "info"
  # -- TEE enclave service URL
  enclaveUrl: "http://worldzk-enclave:8080"
  # -- Event polling interval in seconds
  pollIntervalSecs: "12"

# -- Operator component configuration
operator:
  # -- Enable the operator deployment
  enabled: true
  # -- Number of operator replicas
  replicaCount: 2
  image:
    # -- Operator container image repository
    repository: world-zk-compute/operator
    # -- Operator container image tag
    tag: latest
    # -- Image pull policy
    pullPolicy: IfNotPresent
  # -- Operator service port
  port: 8080
  # -- Additional environment variables for the operator
  env:
    RUST_LOG_FORMAT: "json"
  # -- Resource requests and limits
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "1000m"
  # -- Liveness probe configuration
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  # -- Readiness probe configuration
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  # -- Size limit for the ephemeral proof storage volume
  proofStorageSizeLimit: 1Gi
  # -- Termination grace period in seconds
  terminationGracePeriodSeconds: 30

# -- Indexer component configuration
indexer:
  # -- Enable the indexer deployment
  enabled: true
  # -- Number of indexer replicas (must be 1 for SQLite)
  replicaCount: 1
  image:
    # -- Indexer container image repository
    repository: world-zk-compute/indexer
    # -- Indexer container image tag
    tag: latest
    # -- Image pull policy
    pullPolicy: IfNotPresent
  # -- Indexer service port
  port: 8081
  # -- Postgres configuration (when using DB_TYPE=postgres)
  postgres:
    # -- Enable Postgres backend (requires DATABASE_URL in secrets)
    enabled: false
  # -- Additional environment variables for the indexer
  env:
    DB_PATH: "/data/indexer.db"
  # -- Resource requests and limits
  resources:
    requests:
      memory: "128Mi"
      cpu: "250m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  # -- Liveness probe configuration
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  # -- Readiness probe configuration
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  # -- Persistent volume claim configuration for SQLite storage
  persistence:
    # -- Enable persistent storage
    enabled: true
    # -- Storage class name (empty string uses cluster default)
    storageClassName: ""
    # -- Access modes for the PVC
    accessModes:
      - ReadWriteOnce
    # -- Storage size
    size: 1Gi
    # -- Annotations for the PVC
    annotations: {}
  # -- Termination grace period in seconds
  terminationGracePeriodSeconds: 15

# -- Enclave (TEE) component configuration
enclave:
  # -- Enable the enclave deployment
  enabled: true
  # -- Number of enclave replicas
  replicaCount: 1
  image:
    # -- Enclave container image repository
    repository: world-zk-compute/enclave
    # -- Enclave container image tag
    tag: latest
    # -- Image pull policy
    pullPolicy: IfNotPresent
  # -- Enclave HTTP port
  port: 8090
  # -- Additional environment variables for the enclave
  env:
    MODEL_FORMAT: "xgboost"
    NITRO_ENABLED: "false"
  # -- Resource requests and limits
  resources:
    requests:
      memory: "256Mi"
      cpu: "500m"
    limits:
      memory: "512Mi"
      cpu: "2000m"
  # -- Liveness probe configuration
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  # -- Readiness probe configuration
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  # -- Size limit for model storage volume
  modelStorageSizeLimit: 512Mi
  # -- Termination grace period in seconds
  terminationGracePeriodSeconds: 15

# -- Warm prover component configuration
prover:
  # -- Enable the prover deployment
  enabled: false
  # -- Number of prover replicas
  replicaCount: 1
  image:
    # -- Prover container image repository
    repository: world-zk-compute/prover
    # -- Prover container image tag
    tag: latest
    # -- Image pull policy
    pullPolicy: IfNotPresent
  # -- Prover HTTP port
  port: 8081
  # -- Additional environment variables for the prover
  env: {}
  # -- Resource requests and limits (proving is CPU/memory intensive)
  resources:
    requests:
      memory: "4Gi"
      cpu: "2000m"
    limits:
      memory: "8Gi"
      cpu: "4000m"
  # -- Liveness probe configuration
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  # -- Readiness probe configuration
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  # -- Size limit for proof output storage
  proofStorageSizeLimit: 2Gi
  # -- Size limit for program binary storage
  programStorageSizeLimit: 512Mi
  # -- Termination grace period in seconds
  terminationGracePeriodSeconds: 60

# -- Private input server configuration
privateInput:
  # -- Enable the private input server
  enabled: false
  # -- Number of replicas
  replicaCount: 1
  image:
    # -- Private input server image repository
    repository: world-zk-compute/private-input-server
    # -- Private input server image tag
    tag: latest
    # -- Image pull policy
    pullPolicy: IfNotPresent
  # -- Service port
  port: 3001
  # -- Additional environment variables
  env: {}
  # -- Resource requests and limits
  resources:
    requests:
      memory: "64Mi"
      cpu: "100m"
    limits:
      memory: "128Mi"
      cpu: "250m"
  # -- Termination grace period in seconds
  terminationGracePeriodSeconds: 10

# -- Secrets configuration
secrets:
  # -- Create the secret resource (set to true and provide keys, or false to manage externally)
  create: false
  # -- Name override for the secret (defaults to release fullname + "-secrets")
  nameOverride: ""
  # -- Operator private key (hex with 0x prefix)
  operatorPrivateKey: ""
  # -- Enclave private key (hex with 0x prefix)
  enclavePrivateKey: ""
  # -- TEE verifier contract address (can also be set via global.contractAddress)
  teeVerifierAddress: ""

# -- Service account configuration
serviceAccount:
  # -- Create service accounts
  create: true
  # -- Annotations to add to the service accounts
  annotations: {}

# -- HorizontalPodAutoscaler configuration for the operator
autoscaling:
  # -- Enable HPA for operator
  enabled: true
  # -- Minimum number of replicas
  minReplicas: 2
  # -- Maximum number of replicas
  maxReplicas: 5
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 70
  # -- Scale-down stabilization window in seconds
  scaleDownStabilizationSeconds: 300
  # -- Scale-up stabilization window in seconds
  scaleUpStabilizationSeconds: 60

# -- PodDisruptionBudget configuration
podDisruptionBudget:
  # -- Enable PDB for operator
  enabled: true
  # -- Minimum number of available pods
  minAvailable: 1

# -- NetworkPolicy configuration
networkPolicy:
  # -- Enable network policy
  enabled: true

# -- Ingress configuration
ingress:
  # -- Enable ingress
  enabled: false
  # -- Ingress class name
  className: ""
  # -- Annotations for the ingress
  annotations: {}
  # -- Ingress host configuration
  hosts: []
  #  - host: worldzk.example.com
  # -- TLS configuration
  tls: []
  #  - secretName: worldzk-tls
  #    hosts:
  #      - worldzk.example.com

# -- Periodic wallet balance check CronJob
balanceCheck:
  # -- Enable balance check CronJob
  enabled: false
  # -- Cron schedule (default: every 6 hours)
  schedule: "0 */6 * * *"
  # -- Container image (uses Foundry for cast)
  image: "ghcr.io/foundry-rs/foundry:v1.0.0"
  # -- Minimum balance in wei (default: 0.01 ETH)
  minBalanceWei: "10000000000000000"

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override the release name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

# -- Pod annotations applied to all pods
podAnnotations: {}

# -- Node selector applied to all pods
nodeSelector: {}

# -- Tolerations applied to all pods
tolerations: []

# -- Affinity rules applied to all pods
affinity: {}
