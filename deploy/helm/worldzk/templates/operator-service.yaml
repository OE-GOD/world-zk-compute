{{- if .Values.operator.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "worldzk.operator.fullname" . }}
  labels:
    {{- include "worldzk.operator.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "worldzk.operator.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.operator.port }}
      targetPort: http
      protocol: TCP
{{- end }}
