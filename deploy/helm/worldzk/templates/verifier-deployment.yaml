{{- if .Values.verifier.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "worldzk.verifier.fullname" . }}
  labels:
    {{- include "worldzk.verifier.labels" . | nindent 4 }}
spec:
  {{- if not ((.Values.verifier.autoscaling).enabled) }}
  replicas: {{ .Values.verifier.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "worldzk.verifier.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "worldzk.verifier.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "worldzk.verifier.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.verifier.terminationGracePeriodSeconds }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: verifier
          image: "{{ .Values.verifier.image.repository }}:{{ .Values.verifier.image.tag }}"
          imagePullPolicy: {{ .Values.verifier.image.pullPolicy }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          ports:
            - name: http
              containerPort: {{ .Values.verifier.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.verifier.port | quote }}
            {{- range $key, $value := .Values.verifier.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- with .Values.verifier.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.verifier.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.verifier.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
