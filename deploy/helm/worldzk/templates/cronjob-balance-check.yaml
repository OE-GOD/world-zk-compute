{{- if .Values.balanceCheck.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "worldzk.fullname" . }}-balance-check
  labels:
    {{- include "worldzk.labels" . | nindent 4 }}
    app.kubernetes.io/component: balance-check
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 120
      template:
        metadata:
          labels:
            {{- include "worldzk.labels" . | nindent 12 }}
            app.kubernetes.io/component: balance-check
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          containers:
            - name: balance-check
              image: {{ .Values.balanceCheck.image | default "ghcr.io/foundry-rs/foundry:v1.0.0" }}
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  RPC_URL="${RPC_URL}"
                  THRESHOLD="${BALANCE_THRESHOLD:-0.01}"
                  # Convert threshold from ETH to wei (multiply by 1e18)
                  # cast to-wei handles decimal ETH values
                  MIN_WEI=$(cast to-wei "$THRESHOLD" 2>/dev/null || echo "10000000000000000")

                  echo "Balance check started"
                  echo "  RPC:       $RPC_URL"
                  echo "  Threshold: $THRESHOLD ETH ($MIN_WEI wei)"
                  echo ""

                  STATUS=0

                  check_balance() {
                    local name="$1"
                    local addr="$2"
                    if [ -z "$addr" ]; then
                      echo "SKIP: $name (no address configured)"
                      return
                    fi

                    bal=$(cast balance "$addr" --rpc-url "$RPC_URL" 2>/dev/null || echo "0")
                    bal_eth=$(cast from-wei "$bal" 2>/dev/null || echo "unknown")

                    if [ "$bal" -lt "$MIN_WEI" ] 2>/dev/null; then
                      echo "WARNING: $name ($addr) balance LOW: $bal_eth ETH ($bal wei)"
                      STATUS=1
                    else
                      echo "OK: $name ($addr) balance: $bal_eth ETH"
                    fi
                  }

                  check_balance "operator" "$OPERATOR_ADDRESS"
                  check_balance "enclave"  "$ENCLAVE_ADDRESS"

                  echo ""
                  if [ "$STATUS" -ne 0 ]; then
                    echo "One or more wallets are below the threshold."
                    exit 1
                  fi
                  echo "All balance checks passed."
              envFrom:
                - configMapRef:
                    name: {{ include "worldzk.configMapName" . }}
              env:
                - name: RPC_URL
                  value: {{ required "global.rpcUrl is required" .Values.global.rpcUrl | quote }}
                - name: BALANCE_THRESHOLD
                  value: {{ .Values.balanceCheck.threshold | default "0.01" | quote }}
                - name: OPERATOR_ADDRESS
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "worldzk.secretName" . }}
                      key: operator-address
                      optional: true
                - name: ENCLAVE_ADDRESS
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "worldzk.secretName" . }}
                      key: enclave-address
                      optional: true
              resources:
                requests:
                  memory: "32Mi"
                  cpu: "50m"
                limits:
                  memory: "64Mi"
                  cpu: "100m"
{{- end }}
