{{- if and .Values.podDisruptionBudget.enabled .Values.operator.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "worldzk.operator.fullname" . }}-pdb
  labels:
    {{- include "worldzk.operator.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "worldzk.operator.selectorLabels" . | nindent 6 }}
{{- end }}
