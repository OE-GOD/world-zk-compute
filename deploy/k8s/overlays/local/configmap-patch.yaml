---
# Patch the base ConfigMap for local development.
# Points at Anvil (local Ethereum node) with debug logging enabled.
apiVersion: v1
kind: ConfigMap
metadata:
  name: world-zk-config
data:
  # Local Anvil RPC endpoint.
  # When running Anvil inside the cluster, use the service name.
  # When running Anvil on the host, use host.docker.internal:8545.
  OPERATOR_RPC_URL: "http://anvil:8545"

  # Anvil default chain ID.
  CHAIN_ID: "31337"

  # Debug logging for local development.
  # Per-module filters: "debug,hyper=info,tower=info"
  RUST_LOG: "debug"
