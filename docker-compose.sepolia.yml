# ===============================================================================
# TEE + ZK Dispute System -- Sepolia Testnet
#
# Runs services against Sepolia (no anvil, no deployer).
# Contracts must be deployed first via: ./scripts/deploy-sepolia-tee.sh
#
# Usage:
#   cp .env.sepolia.example .env.sepolia   # fill in values
#   docker compose -f docker-compose.sepolia.yml --env-file .env.sepolia up -d
#   docker compose -f docker-compose.sepolia.yml --env-file .env.sepolia logs -f
#   docker compose -f docker-compose.sepolia.yml down
#
# Required env vars (in .env.sepolia):
#   ALCHEMY_SEPOLIA_RPC_URL, ENCLAVE_PRIVATE_KEY, OPERATOR_PRIVATE_KEY,
#   TEE_VERIFIER_ADDRESS, EXECUTION_ENGINE_ADDRESS, PROGRAM_REGISTRY_ADDRESS
# ===============================================================================

services:
  # -- TEE Enclave ----------------------------------------------------------------
  enclave:
    build:
      context: ./tee
    ports:
      - "8080:8080"
    environment:
      MODEL_PATH: /app/model/model.json
      PORT: "8080"
      ENCLAVE_PRIVATE_KEY: "${ENCLAVE_PRIVATE_KEY:?Set ENCLAVE_PRIVATE_KEY in .env.sepolia}"
      CHAIN_ID: "11155111"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Security hardening
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    user: "1000:1000"
    pids_limit: 100
    networks:
      - frontend
      - backend

  # -- Warm Prover (ZK Proof Server) ---------------------------------------------
  warm-prover:
    build:
      context: ./examples/xgboost-remainder
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    mem_limit: 2g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Security hardening
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=256m
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    user: "1000:1000"
    pids_limit: 100
    networks:
      - backend

  # -- Operator Service -----------------------------------------------------------
  operator:
    build:
      context: .
      dockerfile: services/operator/Dockerfile
    depends_on:
      enclave:
        condition: service_healthy
      warm-prover:
        condition: service_healthy
    ports:
      - "9090:9090"
    environment:
      OPERATOR_RPC_URL: "${ALCHEMY_SEPOLIA_RPC_URL:?Set ALCHEMY_SEPOLIA_RPC_URL in .env.sepolia}"
      OPERATOR_PRIVATE_KEY: "${OPERATOR_PRIVATE_KEY:?Set OPERATOR_PRIVATE_KEY in .env.sepolia}"
      ENCLAVE_URL: "http://enclave:8080"
      PROVER_URL: "http://warm-prover:3000"
      MODEL_PATH: /app/model/model.json
      PROOFS_DIR: /app/proofs
      PRECOMPUTE_BIN: /usr/local/bin/precompute_proof
      # Contract addresses (from deployment)
      TEE_VERIFIER_ADDRESS: "${TEE_VERIFIER_ADDRESS:?Set TEE_VERIFIER_ADDRESS in .env.sepolia}"
      EXECUTION_ENGINE_ADDRESS: "${EXECUTION_ENGINE_ADDRESS:?Set EXECUTION_ENGINE_ADDRESS in .env.sepolia}"
      PROGRAM_REGISTRY_ADDRESS: "${PROGRAM_REGISTRY_ADDRESS:?Set PROGRAM_REGISTRY_ADDRESS in .env.sepolia}"
      # Chain config
      CHAIN_ID: "11155111"
      # Operator config
      OPERATOR_POLL_INTERVAL: "${OPERATOR_POLL_INTERVAL:-12}"
      OPERATOR_AUTO_DISPUTE: "${OPERATOR_AUTO_DISPUTE:-false}"
      RUST_LOG: "info"
      RUST_LOG_FORMAT: "json"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9090/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - proof-storage:/app/proofs
    # Security hardening
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    user: "1000:1000"
    pids_limit: 100
    networks:
      - backend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  proof-storage:
