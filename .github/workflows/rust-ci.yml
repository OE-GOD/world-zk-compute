name: Rust CI

permissions: read-all

on:
  push:
    branches: [main]
    paths:
      - 'sdk/**'
      - 'services/operator/**'
      - 'services/admin-cli/**'
      - 'services/indexer/**'
      - 'crates/**'
      - 'tee/enclave/**'
      - 'prover/**'
      - 'tests/chaos/**'
      - 'examples/xgboost-remainder/**'
      - 'private-input-server/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    paths:
      - 'sdk/**'
      - 'services/operator/**'
      - 'services/admin-cli/**'
      - 'services/indexer/**'
      - 'crates/**'
      - 'tee/enclave/**'
      - 'prover/**'
      - 'tests/chaos/**'
      - 'examples/xgboost-remainder/**'
      - 'private-input-server/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.92.0"

jobs:
  rust-sdk:
    name: Rust SDK
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-sdk-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-sdk-

      - name: Check formatting
        run: cargo fmt --manifest-path sdk/Cargo.toml --check

      - name: Run Clippy
        run: cargo clippy --manifest-path sdk/Cargo.toml -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path sdk/Cargo.toml

  operator:
    name: Operator Service
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-operator-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-operator-

      - name: Check formatting
        run: cargo fmt --manifest-path services/operator/Cargo.toml --check

      - name: Run Clippy
        run: cargo clippy --manifest-path services/operator/Cargo.toml -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path services/operator/Cargo.toml

      - name: Install Foundry (for watcher integration tests)
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install solc (for watcher integration tests)
        run: |
          pip3 install solc-select
          solc-select install 0.8.20
          solc-select use 0.8.20

      - name: Run watcher integration tests (requires Anvil + solc)
        run: cargo test --manifest-path services/operator/Cargo.toml watcher_integration -- --ignored

  admin-cli:
    name: Admin CLI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-admin-cli-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-admin-cli-

      - name: Check formatting
        run: cargo fmt --manifest-path services/admin-cli/Cargo.toml --check

      - name: Run Clippy
        run: cargo clippy --manifest-path services/admin-cli/Cargo.toml -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path services/admin-cli/Cargo.toml

  indexer:
    name: Indexer Service
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-indexer-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-indexer-

      - name: Check formatting
        run: cargo fmt --manifest-path services/indexer/Cargo.toml --check

      - name: Run Clippy
        run: cargo clippy --manifest-path services/indexer/Cargo.toml -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path services/indexer/Cargo.toml

  watcher-crate:
    name: Shared Watcher Crate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-watcher-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-watcher-

      - name: Check formatting
        run: cargo fmt --manifest-path crates/watcher/Cargo.toml --check

      - name: Run Clippy
        run: cargo clippy --manifest-path crates/watcher/Cargo.toml -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path crates/watcher/Cargo.toml

  events-crate:
    name: Shared Events Crate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-events-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-events-

      - name: Check formatting
        run: cargo fmt --manifest-path crates/events/Cargo.toml --check

      - name: Run Clippy
        run: cargo clippy --manifest-path crates/events/Cargo.toml -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path crates/events/Cargo.toml

  enclave:
    name: TEE Enclave
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-enclave-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-enclave-

      - name: Check formatting
        run: cargo fmt --manifest-path tee/enclave/Cargo.toml --check

      - name: Run Clippy
        run: cargo clippy --manifest-path tee/enclave/Cargo.toml -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path tee/enclave/Cargo.toml

  private-input-server:
    name: Private Input Server
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            private-input-server/target
          key: ${{ runner.os }}-cargo-pis-${{ hashFiles('private-input-server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-pis-

      - name: Check formatting
        run: cargo fmt --manifest-path private-input-server/Cargo.toml --check

      - name: Run Clippy
        run: cargo clippy --manifest-path private-input-server/Cargo.toml -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path private-input-server/Cargo.toml

  prover:
    name: Prover
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            prover/target
          key: ${{ runner.os }}-cargo-prover-${{ hashFiles('prover/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-prover-

      - name: Check formatting
        run: cargo fmt --manifest-path prover/Cargo.toml --check

      - name: Run Clippy
        run: cargo clippy --manifest-path prover/Cargo.toml -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path prover/Cargo.toml

  xgboost-remainder:
    name: XGBoost Remainder
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            examples/xgboost-remainder/target
          key: ${{ runner.os }}-cargo-remainder-${{ hashFiles('examples/xgboost-remainder/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-remainder-

      - name: Check formatting
        run: cargo fmt --manifest-path examples/xgboost-remainder/Cargo.toml --check

      - name: Run Clippy
        run: cargo clippy --manifest-path examples/xgboost-remainder/Cargo.toml -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path examples/xgboost-remainder/Cargo.toml

  workspace-clippy:
    name: Workspace Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-

      - name: Run Clippy (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings

  workspace-fmt:
    name: Workspace Rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  chaos-tests:
    name: Chaos Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-chaos-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-chaos-

      - name: Run chaos tests
        run: cargo test -p chaos-tests

  stylus-verifier:
    name: Stylus GKR Verifier
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/stylus/gkr-verifier/target
          key: ${{ runner.os }}-cargo-stylus-${{ hashFiles('contracts/stylus/gkr-verifier/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-stylus-

      - name: Check WASM build
        run: cargo check --manifest-path contracts/stylus/gkr-verifier/Cargo.toml --target wasm32-unknown-unknown

      - name: Run native tests
        run: cargo test --manifest-path contracts/stylus/gkr-verifier/Cargo.toml --target x86_64-unknown-linux-gnu

  indexer-postgres:
    name: Indexer (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: indexer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-indexer-pg-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-indexer-pg-

      - name: Validate schema migration
        env:
          PGPASSWORD: test
        run: psql -h localhost -U test -d indexer_test -f services/indexer/migrations/001_init.sql

      - name: Build with postgres feature
        run: cargo check -p tee-indexer --features postgres

      - name: Run unit tests with postgres feature
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/indexer_test
        run: cargo test -p tee-indexer --features postgres

      - name: Run postgres integration tests
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/indexer_test
        run: cargo test -p tee-indexer --features postgres -- --ignored

      - name: Verify schema tables exist
        env:
          PGPASSWORD: test
        run: |
          echo "Checking that all expected tables were created..."
          for table in events sync_state results indexer_state; do
            psql -h localhost -U test -d indexer_test -c \
              "SELECT COUNT(*) FROM ${table};" > /dev/null 2>&1 \
              || { echo "FAIL: table '${table}' does not exist"; exit 1; }
            echo "  OK: ${table}"
          done
          echo "All tables verified."

  workspace-check:
    name: Workspace Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-workspace-check-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-workspace-check-

      - name: Check all workspace packages
        run: cargo check --workspace

  coverage:
    name: Rust Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-coverage-

      - name: Generate coverage report
        run: cargo llvm-cov --workspace --html --output-dir coverage-report

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage-report
          path: coverage-report/
          retention-days: 14
