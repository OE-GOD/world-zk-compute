name: Rust CI

permissions: read-all

on:
  push:
    branches: [main]
    paths:
      - 'sdk/**'
      - 'services/operator/**'
      - 'services/admin-cli/**'
      - 'services/indexer/**'
      - 'crates/**'
      - 'tee/enclave/**'
      - 'tests/chaos/**'
      - 'examples/xgboost-remainder/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    paths:
      - 'sdk/**'
      - 'services/operator/**'
      - 'services/admin-cli/**'
      - 'services/indexer/**'
      - 'crates/**'
      - 'tee/enclave/**'
      - 'tests/chaos/**'
      - 'examples/xgboost-remainder/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.92.0"

jobs:
  rust-sdk:
    name: Rust SDK
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sdk/target
          key: ${{ runner.os }}-cargo-sdk-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-sdk-

      - name: Check formatting
        run: cargo fmt --manifest-path sdk/Cargo.toml --check

      - name: Run Clippy
        run: cargo clippy --manifest-path sdk/Cargo.toml -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path sdk/Cargo.toml

  operator:
    name: Operator Service
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/operator/target
          key: ${{ runner.os }}-cargo-operator-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-operator-

      - name: Check formatting
        run: cargo fmt --manifest-path services/operator/Cargo.toml --check

      - name: Run Clippy
        run: cargo clippy --manifest-path services/operator/Cargo.toml -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path services/operator/Cargo.toml

  admin-cli:
    name: Admin CLI
