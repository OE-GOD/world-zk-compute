name: Security Audit

permissions: read-all

on:
  push:
    branches: [main]
  schedule:
    # Every Monday at 6:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.92.0"

jobs:
  rust-audit:
    name: Rust Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-audit-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-audit-registry-

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit workspace (root Cargo.lock)
        run: cargo audit --deny warnings

      - name: Audit examples/xgboost-remainder/ (excluded from workspace)
        run: cargo audit --file examples/xgboost-remainder/Cargo.lock --deny warnings

      - name: Audit private-input-server (excluded from workspace)
        run: cargo audit --file private-input-server/Cargo.lock --deny warnings

  python-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install Python SDK dependencies
        run: |
          cd sdk/python
          pip install -e '.[web3]'

      - name: Run pip-audit
        run: |
          cd sdk/python
          pip-audit --strict --desc on

  npm-audit:
    name: NPM Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Install dependencies
        run: cd sdk/typescript && npm ci

      - name: Run npm audit
        run: cd sdk/typescript && npm audit --audit-level=high

  rust-outdated:
    name: Rust Dependency Freshness
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install cargo-outdated
        run: cargo install cargo-outdated --locked

      - name: Check workspace dependencies
        run: |
          echo "## Workspace Dependencies" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cargo outdated --workspace --root-deps-only 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Check prover dependencies
        run: |
          echo "## Prover Dependencies" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cargo outdated --manifest-path prover/Cargo.toml --root-deps-only 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Check xgboost-remainder dependencies
        run: |
          echo "## XGBoost Remainder Dependencies" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cargo outdated --manifest-path examples/xgboost-remainder/Cargo.toml --root-deps-only 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
