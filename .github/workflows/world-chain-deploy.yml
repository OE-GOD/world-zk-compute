name: World Chain Sepolia Deployment

permissions: read-all

on:
  push:
    branches: [main]
    paths:
      - 'contracts/src/**'
      - 'contracts/script/**'
      - 'contracts/test/fixtures/**'
      - 'contracts/foundry.toml'
  pull_request:
    paths:
      - 'contracts/src/**'
      - 'contracts/script/**'
      - 'contracts/test/fixtures/**'
      - 'contracts/foundry.toml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Simulate deployment without broadcasting transactions'
        type: boolean
        default: true
      skip_circuit_registration:
        description: 'Skip DAG circuit registration during deployment'
        type: boolean
        default: false
      verify_contracts:
        description: 'Verify contracts on Worldscan after deployment'
        type: boolean
        default: true

jobs:
  # ---- Automated dry-run on push/PR to catch script regressions ----
  dry-run-validate:
    name: Validate DeployWorldChain (Anvil dry-run)
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build contracts
        working-directory: contracts
        run: forge build

      - name: Start Anvil (chain ID 4801)
        run: |
          anvil --chain-id 4801 --gas-limit 500000000 --silent &
          ANVIL_PID=$!
          echo "ANVIL_PID=$ANVIL_PID" >> "$GITHUB_ENV"
          # Wait for Anvil to be ready
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:8545 -X POST -H 'Content-Type: application/json' \
              -d '{"jsonrpc":"2.0","method":"eth_chainId","params":[],"id":1}' | grep -q result; then
              echo "Anvil ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run DeployWorldChain dry-run
        working-directory: contracts
        env:
          # Anvil default account 0 private key
          DEPLOYER_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
        run: |
          forge script script/DeployWorldChain.s.sol:DeployWorldChain \
            --rpc-url http://127.0.0.1:8545 \
            -vvv 2>&1 | tee deploy-dry-run.txt

          echo "## DeployWorldChain Dry-Run (Anvil)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Deployment script simulation completed successfully." >> "$GITHUB_STEP_SUMMARY"

      - name: Stop Anvil
        if: always()
        run: |
          if [ -n "$ANVIL_PID" ]; then
            kill "$ANVIL_PID" 2>/dev/null || true
          fi

  # ---- Manual deployment to World Chain Sepolia ----
  deploy:
    name: Deploy to World Chain Sepolia
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build contracts
        working-directory: contracts
        run: forge build

      - name: Run deployment
        working-directory: contracts
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          WORLD_CHAIN_RPC_URL: ${{ secrets.WORLD_CHAIN_RPC_URL }}
          WORLDSCAN_API_KEY: ${{ secrets.WORLDSCAN_API_KEY }}
          SKIP_CIRCUIT_REGISTRATION: ${{ inputs.skip_circuit_registration }}
        run: |
          FORGE_ARGS=(
            script/DeployWorldChain.s.sol:DeployWorldChain
            --rpc-url "$WORLD_CHAIN_RPC_URL"
            -vvv
          )

          if [ "${{ inputs.dry_run }}" = "false" ]; then
            FORGE_ARGS+=(--broadcast)
            echo "::notice::Broadcasting transactions to World Chain Sepolia"
          else
            echo "::notice::DRY RUN -- transactions will NOT be broadcast"
          fi

          if [ "${{ inputs.verify_contracts }}" = "true" ] && [ "${{ inputs.dry_run }}" = "false" ]; then
            FORGE_ARGS+=(--verify --etherscan-api-key "$WORLDSCAN_API_KEY")
          fi

          forge script "${FORGE_ARGS[@]}" 2>&1 | tee deploy-output.txt

      - name: Extract deployed addresses
        if: ${{ inputs.dry_run == false }}
        run: |
          echo "## World Chain Sepolia Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Contract | Address |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|---------|" >> "$GITHUB_STEP_SUMMARY"

          cd contracts
          for contract in RemainderVerifier ProgramRegistry ProverReputation StakeToken ProverRegistry ExecutionEngine TEEMLVerifier; do
            addr=$(grep -oP "${contract}.*?:\s*0x[0-9a-fA-F]{40}" deploy-output.txt | grep -oP '0x[0-9a-fA-F]{40}' | tail -1 || echo "not found")
            echo "| ${contract} | \`${addr}\` |" >> "$GITHUB_STEP_SUMMARY"
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Chain ID: 4801" >> "$GITHUB_STEP_SUMMARY"
          echo "Dry run: ${{ inputs.dry_run }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Dry run summary
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "## World Chain Sepolia Deployment (DRY RUN)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Dry run completed successfully. Set \`dry_run\` to \`false\` to broadcast." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload deployment artifacts
        if: ${{ inputs.dry_run == false }}
        uses: actions/upload-artifact@v7
        with:
          name: world-chain-sepolia-deployment
          path: |
            contracts/broadcast/DeployWorldChain.s.sol/4801/
            contracts/deploy-output.txt
          if-no-files-found: warn
