name: Deploy Verifier API

on:
  push:
    branches: [main]
    paths:
      - 'services/verifier/**'
      - 'crates/zkml-verifier/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - uses: actions/checkout@v6

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --config services/verifier/fly.toml --dockerfile services/verifier/Dockerfile --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Health check
        run: |
          sleep 10
          curl -sf https://worldzk-verifier.fly.dev/health | jq .
        continue-on-error: true
