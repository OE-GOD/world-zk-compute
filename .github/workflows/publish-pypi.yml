name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build native library
        run: |
          cargo build --release --lib -p zkml-verifier --target ${{ matrix.target }}

      - name: Copy library to package dir
        run: |
          cd crates/zkml-verifier/python
          mkdir -p zkml_verifier
          if [ "${{ runner.os }}" = "macOS" ]; then
            cp ../../../target/${{ matrix.target }}/release/libzkml_verifier.dylib zkml_verifier/
          else
            cp ../../../target/${{ matrix.target }}/release/libzkml_verifier.so zkml_verifier/
          fi

      - name: Build wheel
        run: |
          cd crates/zkml-verifier/python
          pip install build wheel setuptools
          ZKML_SKIP_BUILD=1 python -m build --wheel
        env:
          ZKML_LIB_DIR: ${{ github.workspace }}/target/${{ matrix.target }}/release

      - name: Verify wheel contents
        run: |
          cd crates/zkml-verifier/python
          pip install dist/*.whl
          python -c "from zkml_verifier import version; print('Version:', version())"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: crates/zkml-verifier/python/dist/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist
        run: |
          cd crates/zkml-verifier/python
          pip install build
          ZKML_SKIP_BUILD=1 python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: crates/zkml-verifier/python/dist/*.tar.gz

  test-wheels:
    name: Test wheel (${{ matrix.os }}, Python ${{ matrix.python }})
    needs: build-wheels
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            python: "3.9"
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            python: "3.11"
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            python: "3.12"
          - os: macos-latest
            target: aarch64-apple-darwin
            python: "3.11"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: actions/download-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/

      - name: Install and test
        run: |
          pip install dist/*.whl
          pip install pytest
          python -c "from zkml_verifier import version, __version__; print(f'Native: {version()}, Pkg: {__version__}')"
          cd crates/zkml-verifier/python
          pytest tests/ -v

  publish:
    name: Publish to ${{ github.event_name == 'release' && 'PyPI' || inputs.publish_target }}
    needs: [build-wheels, build-sdist, test-wheels]
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'release' && 'pypi' || inputs.publish_target }}
      url: ${{ github.event_name == 'release' && 'https://pypi.org/project/zkml-verifier/' || 'https://test.pypi.org/project/zkml-verifier/' }}
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        if: github.event_name == 'release' || inputs.publish_target == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Publish to TestPyPI
        if: github.event_name != 'release' && inputs.publish_target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          repository-url: https://test.pypi.org/legacy/
