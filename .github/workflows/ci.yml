name: CI

permissions: read-all

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.92.0"

jobs:
  solidity:
    name: Solidity Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install forge dependencies
        run: |
          cd contracts
          forge install foundry-rs/forge-std --no-git
          forge install risc0/risc0-ethereum --no-git

      - name: Check Solidity formatting
        run: |
          cd contracts
          forge fmt --check

      - name: Run Solidity tests
        run: |
          cd contracts
          forge test -vv

  rust:
    name: Rust Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.risc0
            prover/target
          key: ${{ runner.os }}-cargo-prover-${{ hashFiles('prover/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-prover-

      - name: Install RISC Zero toolchain
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -L https://risczero.com/install | bash
          ~/.risc0/bin/rzup install r0vm 3.0.5
          echo "$HOME/.risc0/bin" >> $GITHUB_PATH

      - name: Check Rust formatting
        run: cargo fmt --manifest-path prover/Cargo.toml --check

      - name: Run Clippy
        run: cargo clippy --manifest-path prover/Cargo.toml -- -D warnings

      - name: Run Rust tests
        run: cargo test --manifest-path prover/Cargo.toml

  remainder:
    name: Remainder (XGBoost Circuit) Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            examples/xgboost-remainder/target
          key: ${{ runner.os }}-cargo-remainder-${{ hashFiles('examples/xgboost-remainder/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-remainder-

      - name: Check formatting
        run: cargo fmt --manifest-path examples/xgboost-remainder/Cargo.toml --check

      - name: Run Clippy
        run: cargo clippy --manifest-path examples/xgboost-remainder/Cargo.toml -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path examples/xgboost-remainder/Cargo.toml

  stylus:
    name: Stylus GKR Verifier Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/stylus/gkr-verifier/target
          key: ${{ runner.os }}-cargo-stylus-${{ hashFiles('contracts/stylus/gkr-verifier/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-stylus-

      - name: Check formatting
        run: cargo fmt --manifest-path contracts/stylus/gkr-verifier/Cargo.toml --check

      - name: Run Clippy (native)
        run: cargo clippy --manifest-path contracts/stylus/gkr-verifier/Cargo.toml --no-default-features -- -D warnings

      - name: Run tests (native)
        run: cargo test --manifest-path contracts/stylus/gkr-verifier/Cargo.toml --no-default-features

      - name: Build WASM
        run: cargo build --manifest-path contracts/stylus/gkr-verifier/Cargo.toml --release --target wasm32-unknown-unknown --lib

      - name: Check WASM size
        run: |
          WASM=contracts/stylus/gkr-verifier/target/wasm32-unknown-unknown/release/gkr_verifier.wasm
          RAW_SIZE=$(stat -c%s "$WASM")
          echo "Raw WASM size: $RAW_SIZE bytes ($(echo "scale=1; $RAW_SIZE / 1024" | bc) KB)"
          # Warn if raw size exceeds 128KB (brotli typically compresses ~2.5x)
          if [ "$RAW_SIZE" -gt 131072 ]; then
            echo "::warning::WASM binary is large ($RAW_SIZE bytes). Brotli-compressed size may exceed 24KB Stylus limit."
          fi

  gnark:
    name: gnark Groth16 Wrapper Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: examples/xgboost-remainder/gnark-wrapper/go.sum

      - name: Run Go tests
        run: |
          cd examples/xgboost-remainder/gnark-wrapper
          go test -v -timeout 300s ./...

  rust-sdk:
    name: Rust SDK Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sdk/target
          key: ${{ runner.os }}-cargo-sdk-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-sdk-

      - name: Check formatting
        run: cargo fmt --manifest-path sdk/Cargo.toml --check

      - name: Run Clippy
        run: cargo clippy --manifest-path sdk/Cargo.toml -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path sdk/Cargo.toml

  typescript-sdk:
    name: TypeScript SDK Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Install dependencies
        run: |
          cd sdk/typescript
          npm ci

      - name: Type check
        run: |
          cd sdk/typescript
          npx tsc --noEmit

      - name: Run tests
        run: |
          cd sdk/typescript
          npx vitest run

      - name: Build
        run: |
          cd sdk/typescript
          npm run build

  sdk-e2e:
    name: SDK E2E (Batch Verification)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust SDK build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sdk/target
          key: ${{ runner.os }}-cargo-sdk-e2e-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-sdk-e2e-

      - name: Install forge dependencies
        run: |
          cd contracts
          forge install foundry-rs/forge-std --no-git
          forge install risc0/risc0-ethereum --no-git

      - name: Start Anvil and deploy contracts
        run: |
          # Start Anvil
          anvil --port 8545 --silent --disable-code-size-limit --gas-limit 500000000 &
          ANVIL_PID=$!
          sleep 2

          # Verify Anvil is up
          curl -sf http://127.0.0.1:8545 -X POST -H "Content-Type: application/json" \
            --data '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' > /dev/null

          # Deploy RemainderVerifier + register DAG circuit
          # DEPLOYER_KEY is Anvil Account #0 (well-known test key, no real value).
          cd contracts
          DEPLOYER_KEY="0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80" \
            forge script script/DeployRemainderDAG.s.sol:DeployRemainderDAG \
            --rpc-url http://127.0.0.1:8545 --broadcast --disable-code-size-limit

          # Extract deployed contract address
          CONTRACT_ADDRESS=$(python3 -c "
          import json, sys
          data = json.load(open('broadcast/DeployRemainderDAG.s.sol/31337/run-latest.json'))
          for tx in data['transactions']:
              if tx.get('transactionType') == 'CREATE':
                  print(tx['contractAddress']); sys.exit(0)
          sys.exit(1)
          ")

          echo "Deployed contract at: $CONTRACT_ADDRESS"
          echo "CONTRACT_ADDRESS=$CONTRACT_ADDRESS" >> $GITHUB_ENV

      - name: TypeScript SDK E2E
        run: |
          cd sdk/typescript
          npm ci
          # Private key is Anvil Account #0 (well-known test key, no real value).
          npx tsx src/batch-verifier.ts \
            --rpc-url http://127.0.0.1:8545 \
            --private-key 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80 \
            --contract $CONTRACT_ADDRESS \
            --fixture ../../contracts/test/fixtures/phase1a_dag_fixture.json

      - name: Rust SDK E2E
        run: |
          cd sdk
          RPC_URL=http://127.0.0.1:8545 CONTRACT_ADDRESS=$CONTRACT_ADDRESS \
            cargo test --test e2e_batch_verify -- --ignored --nocapture

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python SDK E2E
        run: |
          cd sdk/python
          pip install -e ".[web3]"
          # Private key is Anvil Account #0 (well-known test key, no real value).
          python e2e_batch_verify.py \
            --rpc-url http://127.0.0.1:8545 \
            --private-key 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80 \
            --contract $CONTRACT_ADDRESS \
            --fixture ../../contracts/test/fixtures/phase1a_dag_fixture.json

  tee-enclave:
    name: TEE Enclave Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tee/enclave/target
          key: ${{ runner.os }}-cargo-tee-enclave-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tee-enclave-

      - name: Check formatting
        run: cargo fmt --manifest-path tee/enclave/Cargo.toml --check

      - name: Run Clippy
        run: cargo clippy --manifest-path tee/enclave/Cargo.toml -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path tee/enclave/Cargo.toml

  tee-e2e:
    name: TEE Happy Path E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install forge dependencies
        run: |
          cd contracts
          forge install foundry-rs/forge-std --no-git
          forge install risc0/risc0-ethereum --no-git

      - name: Run TEE happy path E2E
        run: bash scripts/tee-e2e.sh

  python-sdk:
    name: Python SDK Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd sdk/python
          pip install -e ".[dev]"

      - name: Run linter
        continue-on-error: true
        run: |
          cd sdk/python
          ruff check .

      - name: Run tests
        run: |
          cd sdk/python
          pytest -v
