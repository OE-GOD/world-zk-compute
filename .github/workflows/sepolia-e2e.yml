name: Sepolia E2E Test (Real Verifier)

permissions: read-all

on:
  workflow_dispatch:
    inputs:
      example:
        description: 'Example to test'
        required: true
        default: 'rule-engine'
        type: choice
        options:
          - rule-engine
          - anomaly-detector
          - sybil-detector
          - signature-verified
          - xgboost-inference

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: world_zk_prover=debug,info

jobs:
  sepolia-e2e:
    name: Sepolia E2E (${{ inputs.example }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.risc0
            prover/target
          key: ${{ runner.os }}-cargo-prover-${{ hashFiles('prover/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-prover-

      - name: Install RISC Zero toolchain
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -L https://risczero.com/install | bash
          ~/.risc0/bin/rzup install r0vm 3.0.5
          echo "$HOME/.risc0/bin" >> $GITHUB_PATH

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install Python dependencies
        run: pip install ecdsa

      - name: Install Forge dependencies
        run: |
          cd contracts
          forge install foundry-rs/forge-std --no-git
          forge install risc0/risc0-ethereum --no-git

      - name: Build prover
        run: cargo build --release --bin world-zk-prover --manifest-path prover/Cargo.toml

      - name: Run Sepolia E2E test
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          PROVER_PRIVATE_KEY: ${{ secrets.PROVER_PRIVATE_KEY }}
          REQUESTER_PRIVATE_KEY: ${{ secrets.REQUESTER_PRIVATE_KEY }}
        run: |
          ./scripts/e2e-test.sh --example ${{ inputs.example }} --network sepolia
