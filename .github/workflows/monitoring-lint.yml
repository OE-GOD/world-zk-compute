name: Monitoring Config Lint

permissions: read-all

on:
  push:
    branches: [main]
    paths:
      - 'monitoring/**'
      - '.github/workflows/monitoring-lint.yml'
  pull_request:
    paths:
      - 'monitoring/**'
      - '.github/workflows/monitoring-lint.yml'
  workflow_dispatch:

jobs:
  validate-configs:
    name: Validate Monitoring Configs
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate YAML syntax
        run: |
          python3 -c "
          import yaml, sys, glob
          errors = 0
          files = glob.glob('monitoring/*.yml') + glob.glob('monitoring/*.yaml')
          if not files:
              print('No YAML files found in monitoring/')
              sys.exit(0)
          for path in sorted(files):
              try:
                  with open(path) as f:
                      yaml.safe_load(f)
                  print(f'  OK: {path}')
              except yaml.YAMLError as e:
                  print(f'  FAIL: {path}: {e}')
                  errors += 1
          if errors:
              print(f'\n{errors} YAML file(s) failed validation.')
              sys.exit(1)
          print('All YAML files valid.')
          "

      - name: Validate Grafana dashboard JSON
        run: |
          python3 -c "
          import json, sys, glob
          errors = 0
          files = glob.glob('monitoring/*.json') + glob.glob('monitoring/**/*.json', recursive=True)
          # Deduplicate
          files = sorted(set(files))
          if not files:
              print('No JSON files found in monitoring/')
              sys.exit(0)
          for path in files:
              try:
                  with open(path) as f:
                      data = json.load(f)
                  # Basic dashboard structure check for Grafana files
                  if 'grafana' in path.lower():
                      if 'panels' not in data and 'rows' not in data:
                          print(f'  WARN: {path}: no panels or rows found (may not be a dashboard)')
                      else:
                          print(f'  OK: {path}')
                  else:
                      print(f'  OK: {path}')
              except json.JSONDecodeError as e:
                  print(f'  FAIL: {path}: {e}')
                  errors += 1
          if errors:
              print(f'\n{errors} JSON file(s) failed validation.')
              sys.exit(1)
          print('All JSON files valid.')
          "

      - name: Check for unfilled placeholders
        run: |
          echo "Checking for <REPLACE_*> placeholders in monitoring config files..."
          # Only check YAML config files, not scripts or documentation
          if grep -rn --include='*.yml' --include='*.yaml' '<REPLACE_' monitoring/ 2>/dev/null; then
            echo ""
            echo "::error::Unfilled <REPLACE_*> placeholders found in monitoring config files."
            echo "These raw placeholders must not be committed. Use \${ENV_VAR} references instead."
            echo "See monitoring/README.md for the list of required environment variables."
            exit 1
          else
            echo "No unfilled placeholders found in config files."
          fi

      - name: Run validate-config.sh
        if: hashFiles('monitoring/validate-config.sh') != ''
        run: |
          chmod +x monitoring/validate-config.sh
          ./monitoring/validate-config.sh
