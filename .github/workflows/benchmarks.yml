name: Benchmarks

permissions: read-all

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  rust-benchmarks:
    name: Rust Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install risc0 toolchain
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -L https://risczero.com/install | bash
          rzup install r0vm 3.0.5

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            prover/target
            examples/xgboost-remainder/target
          key: bench-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            bench-${{ runner.os }}-cargo-

      - name: Run prover micro-benchmarks
        run: |
          cargo bench \
            --manifest-path prover/Cargo.toml \
            --bench prover_benchmarks \
            -- --output-format bencher \
            | tee prover-bench-results.txt

      - name: Run XGBoost Remainder benchmarks
        run: |
          cargo bench \
            --manifest-path examples/xgboost-remainder/Cargo.toml \
            --bench prover_bench \
            -- --sample-size 10 --output-format bencher \
            | tee xgboost-bench-results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: benchmark-results
          path: |
            prover-bench-results.txt
            xgboost-bench-results.txt
            prover/target/criterion/
            examples/xgboost-remainder/target/criterion/
          retention-days: 90
