name: Contracts CI

permissions: read-all

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: |
          cd contracts
          [ -d lib/forge-std ] || forge install foundry-rs/forge-std --no-git
          [ -d lib/risc0-ethereum ] || forge install risc0/risc0-ethereum --no-git

      - name: Build contracts
        run: |
          cd contracts
          forge build

      - name: Check formatting
        run: |
          cd contracts
          forge fmt --check

      - name: Run all tests
        run: |
          cd contracts
          forge test -vv

      - name: Check contract sizes (EIP-170)
        run: bash scripts/check-contract-sizes.sh

      - name: Validate test fixtures
        run: bash scripts/validate-fixtures.sh

      - name: Check fixture freshness
        continue-on-error: true
        run: |
          cd contracts
          FIXTURE_DIR="test/fixtures"
          if [ ! -d "$FIXTURE_DIR" ]; then
            echo "No fixtures directory found, skipping"
            exit 0
          fi

          # Compare last-commit timestamps via git log.
          # (File mtimes in a fresh clone are all set to checkout time,
          #  so filesystem stat is not reliable in CI.)
          STALE=0
          for fixture in "$FIXTURE_DIR"/*.json; do
            [ -f "$fixture" ] || continue
            FIXTURE_EPOCH=$(git log -1 --format="%ct" -- "$fixture" 2>/dev/null || echo 0)
            if [ "$FIXTURE_EPOCH" = "0" ] || [ -z "$FIXTURE_EPOCH" ]; then
              echo "::warning::Fixture $(basename "$fixture") has no git history (untracked?)"
              continue
            fi
            while IFS= read -r src; do
              SRC_EPOCH=$(git log -1 --format="%ct" -- "$src" 2>/dev/null || echo 0)
              if [ "$SRC_EPOCH" -gt "$FIXTURE_EPOCH" ]; then
                echo "::warning::Fixture $(basename "$fixture") may be stale ($(basename "$src") was modified more recently)"
                STALE=1
                break
              fi
            done < <(find src/remainder -name '*.sol' -type f 2>/dev/null)
          done
          if [ "$STALE" -eq 1 ]; then
            echo "::warning::Some test fixtures may be stale. Consider regenerating them."
          else
            echo "All fixtures are up-to-date with source files."
          fi

      - name: Gas regression check (>10% increase = failure, >30M single-tx = failure)
        run: bash scripts/check-gas-regression.sh 10 30000000

      - name: Upload gas snapshot artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gas-snapshot
          path: contracts/.gas-snapshot-new
          retention-days: 30

      - name: Annotate PR with gas summary
        if: always() && github.event_name == 'pull_request'
        run: |
          if [ -f contracts/.gas-snapshot-new ]; then
            total_tests=$(wc -l < contracts/.gas-snapshot-new | tr -d ' ')
            max_gas=$(grep -o 'gas: [0-9]*' contracts/.gas-snapshot-new | grep -o '[0-9]*' | sort -n | tail -1)
            echo "::notice::Gas snapshot: ${total_tests} tests, max single-test gas: ${max_gas}"
          fi

  coverage:
    name: Solidity Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: |
          cd contracts
          [ -d lib/forge-std ] || forge install foundry-rs/forge-std --no-git
          [ -d lib/risc0-ethereum ] || forge install risc0/risc0-ethereum --no-git

      - name: Generate coverage report
        run: |
          cd contracts
          forge coverage --report summary > coverage-summary.txt 2>&1 || true

      - name: Display coverage summary
        run: cat contracts/coverage-summary.txt

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: solidity-coverage-report
          path: contracts/coverage-summary.txt
          retention-days: 14

  slither-analysis:
    name: Slither Static Analysis
    permissions:
      security-events: write
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: |
          cd contracts
          [ -d lib/forge-std ] || forge install foundry-rs/forge-std --no-git
          [ -d lib/risc0-ethereum ] || forge install risc0/risc0-ethereum --no-git

      - name: Build contracts (Slither needs compiled artifacts)
        run: |
          cd contracts
          forge build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Slither
        run: pip install slither-analyzer

      - name: Run Slither (fail on high severity + checklist report)
        id: slither-check
        run: |
          cd contracts
          slither . \
            --config-file slither.config.json \
            --fail-on high \
            --checklist \
            2>&1 | tee slither-report.md
          exit_code=${PIPESTATUS[0]}
          if [ "$exit_code" -ne 0 ]; then
            echo "::error::Slither found high-severity issues. See slither-report artifact for details."
          fi
          exit $exit_code

      - name: Run Slither (SARIF output for GitHub Security)
        if: always()
        run: |
          cd contracts
          slither . \
            --config-file slither.config.json \
            --sarif slither-results.sarif \
            2>&1 || true

      - name: Upload Slither SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: contracts/slither-results.sarif

      - name: Upload Slither report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: slither-report
          path: |
            contracts/slither-report.md
            contracts/slither-results.sarif
          retention-days: 30

      - name: Annotate PR with high-severity findings
        if: always() && github.event_name == 'pull_request'
        run: |
          if [ -f contracts/slither-report.md ] && grep -qi "high" contracts/slither-report.md; then
            echo "::warning::Slither detected findings. Review the slither-report artifact for details."
          fi
