name: SDK CI (TypeScript + Python)

permissions: read-all

on:
  push:
    branches: [main]
    paths:
      - 'sdk/typescript/**'
      - 'sdk/python/**'
  pull_request:
    paths:
      - 'sdk/typescript/**'
      - 'sdk/python/**'
  workflow_dispatch:

jobs:
  typescript-sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Install dependencies
        run: cd sdk/typescript && npm ci

      - name: Type check
        run: cd sdk/typescript && npm run typecheck

      - name: Lint
        run: cd sdk/typescript && npm run lint

      - name: Run tests
        run: cd sdk/typescript && npx vitest run

  python-sdk:
    name: Python SDK (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd sdk/python
          pip install -e '.[dev,web3]'

      - name: Lint
        run: |
          cd sdk/python
          ruff check .

      - name: Run tests
        run: cd sdk/python && python -m pytest tests/ -v --ignore=tests/test_anvil_integration.py --ignore=tests/test_sepolia_integration.py
