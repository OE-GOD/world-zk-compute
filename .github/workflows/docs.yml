name: SDK Documentation

permissions: read-all

on:
  push:
    branches: [main]
    paths:
      - 'sdk/**'
  pull_request:
    paths:
      - 'sdk/**'
  workflow_dispatch:

env:
  RUST_VERSION: "1.92.0"

jobs:
  rust-docs:
    name: Rust SDK (rustdoc)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sdk/target
          key: docs-rust-${{ hashFiles('Cargo.lock') }}

      - name: Generate rustdoc
        run: cd sdk && cargo doc --no-deps --document-private-items 2>&1
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Upload docs artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: rust-sdk-docs
          path: sdk/target/doc/
          retention-days: 30

  typescript-docs:
    name: TypeScript SDK (typedoc)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd sdk/typescript && npm ci

      - name: Generate typedoc
        run: cd sdk/typescript && npx typedoc

      - name: Upload docs artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: typescript-sdk-docs
          path: sdk/typescript/docs/
          retention-days: 30

  python-docs:
    name: Python SDK (pdoc)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd sdk/python
          pip install -e ".[docs]"

      - name: Generate pdoc
        run: cd sdk/python && pdoc worldzk -o docs/_build

      - name: Upload docs artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: python-sdk-docs
          path: sdk/python/docs/_build/
          retention-days: 30
