name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the fields below so we can investigate.

        **If this is a security vulnerability, do NOT open an issue.** Email security@worldcoin.org instead. See [SECURITY.md](../../SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `...`
        2. Call `...`
        3. Observe error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
      placeholder: Describe what should have happened...
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages, logs, or stack traces if available.
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - operator
        - enclave
        - indexer
        - sdk-rust
        - sdk-python
        - sdk-typescript
        - contracts
        - admin-cli
        - prover
        - other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide details about your environment.
      placeholder: |
        - OS: e.g., Ubuntu 22.04 (x86_64), macOS 14 (Apple Silicon)
        - Rust version: e.g., 1.78.0
        - Docker version: e.g., 24.0.7
        - Node version (if applicable): e.g., 20.11.0
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version or Commit
      description: The version tag or commit SHA you are using.
      placeholder: e.g., v0.3.0 or 6b299af
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or log output that might help.
    validations:
      required: false
