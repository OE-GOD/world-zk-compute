name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the fields below so we can investigate.

        **If this is a security vulnerability, do NOT open an issue.** Email security@worldcoin.org instead. See [SECURITY.md](../../SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `...`
        2. Call `...`
        3. Observe error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
      placeholder: Describe what should have happened...
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages, logs, or stack traces if available.
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: Which OS are you running on?
      options:
        - Linux (x86_64)
        - Linux (arm64)
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows
        - Docker / Container
        - Other
    validations:
      required: false

  - type: dropdown
    id: sdk-language
    attributes:
      label: SDK Language
      description: If this involves an SDK, which language?
      options:
        - Rust
        - Python
        - TypeScript
        - N/A
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - contracts
        - operator
        - enclave
        - SDK-Rust
        - SDK-Python
        - SDK-TypeScript
        - prover
        - other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or Commit
      description: The version tag or commit SHA you are using.
      placeholder: e.g., v0.3.0 or 6b299af
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or log output that might help.
    validations:
      required: false
