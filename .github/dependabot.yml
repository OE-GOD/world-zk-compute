version: 2

updates:
  # ── GitHub Actions ─────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"

  # ── Rust / Cargo ───────────────────────────────────────────────────
  # Root workspace (sdk, crates/*, services/*, tee/enclave, tests/chaos)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Prover (excluded from workspace)
  - package-ecosystem: "cargo"
    directory: "/prover"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Private input server (excluded from workspace)
  - package-ecosystem: "cargo"
