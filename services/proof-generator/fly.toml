app = "worldzk-generator"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3002"
  RUST_LOG = "info"
  LOG_FORMAT = "json"
  MOCK = "true"

[http_service]
  internal_port = 3002
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[vm]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
