[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
# via_ir = true  # Yul optimizer hits stack layout limit with DAGBatchVerifier; not needed for tests
remappings = [
    "risc0-ethereum/=lib/risc0-ethereum/contracts/src/",
    "@openzeppelin/contracts/=lib/risc0-ethereum/lib/openzeppelin-contracts/contracts/"
]
fs_permissions = [{ access = "read", path = "test/fixtures" }]

[invariant]
runs = 64
depth = 16
fail_on_revert = false

[rpc_endpoints]
sepolia = "https://rpc.sepolia.org"
world_sepolia = "${WORLD_SEPOLIA_RPC_URL}"
arb_sepolia = "https://sepolia-rollup.arbitrum.io/rpc"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
world_sepolia = { key = "${ETHERSCAN_API_KEY}" }
arb_sepolia = { key = "${ARBISCAN_API_KEY}", url = "https://api-sepolia.arbiscan.io/api" }
