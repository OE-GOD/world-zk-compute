app = "worldzk-verifier"
primary_region = "iad"

[build]
  dockerfile = "services/verifier/Dockerfile"

[env]
  PORT = "3000"
  RUST_LOG = "info"
  RATE_LIMIT_RPM = "60"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
